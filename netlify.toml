[build]
  command = "vite build"
  publish = "dist/client"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

# Route /api/dashboard-data to the Netlify function
[[redirects]]
  from = "/api/dashboard-data"
  to = "/.netlify/functions/dashboard-data"
  status = 200

# SPA fallback — all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
